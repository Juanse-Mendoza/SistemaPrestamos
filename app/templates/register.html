{% extends "base.html" %}
{% block title %}Registro{% endblock %}
{% block body %}
<div class="login-page">
  <div class="login-card" style="max-width:460px">
    <div class="login-logo">🔑 PrestaUni</div>
    <p class="login-sub">Crear cuenta de estudiante</p>

    {% if msg %}
    <div class="alert alert-{{ 'success' if tipo == 'success' else 'error' }}">{{ msg }}</div>
    {% endif %}

    <form method="post" action="/register">
      <div class="form-grid">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label">Nombre *</label>
            <input class="form-control" name="nombre" placeholder="Juan" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Apellido *</label>
            <input class="form-control" name="apellido" placeholder="Pérez" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Correo institucional *</label>
          <input class="form-control" type="email" name="correo"
                 placeholder="juan.perez@academia.umb.edu.co" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Número de documento</label>
          <input class="form-control" name="documento" placeholder="Opcional"/>
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña * (mín. 6 caracteres)</label>
          <input class="form-control" type="password" name="password" required minlength="6"/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar contraseña *</label>
          <input class="form-control" type="password" name="confirm" required/>
        </div>
        <button class="btn btn-primary w-full" style="justify-content:center;margin-top:4px">
          Crear cuenta
        </button>
      </div>
    </form>

    <p class="login-sep">── ya tienes cuenta ──</p>
    <a href="/login">
      <button class="btn btn-ghost w-full" style="justify-content:center">
        Iniciar sesión
      </button>
    </a>
  </div>
</div>
{% endblock %}
